<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Küçüğüme!</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset ve Tam Mobil Uyum Ayarları */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Sağ-sol taşmaları kesinlikle engeller */
        }

        /* Sabit Kırmızı (Romantik) Tema Değişkenleri */
        :root {
            --bg-color: #ffe6e6;
            --pattern-color: #ffb3b3;
            --box-bg: #ffffff;
            --text-color: #800000;
            --heading-color: #cc0000;
            --notebook-bg: #fff0f5;
            --notebook-text: #800000;
            --shadow-color: rgba(204, 0, 0, 0.15);
            --primary-btn: #cc0000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--pattern-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            scroll-behavior: smooth;
        }

        /* Kaydırma Animasyon Sınıfları */
        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, transform;
        }
        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 70px;
            overflow-x: hidden;
        }

        /* Ortak Kutu Stili */
        .card-box {
            background: var(--box-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px var(--shadow-color);
            position: relative;
            width: 100%;
        }

        .section-instruction {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: var(--heading-color);
            text-align: center;
            margin-bottom: 25px;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* --- 1. Defter Yaprağı --- */
        .notebook-wrapper {
            margin-top: 80px;
            position: relative;
            width: 100%;
        }
        .profile-blur-bg {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background-image: url('https://via.placeholder.com/150/ffb6c1/fff?text=Arka+Plan');
            background-size: cover;
            filter: blur(15px);
            border-radius: 50%;
            opacity: 0.7;
            z-index: 0;
        }
        .profile-pic {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid var(--box-bg);
            box-shadow: 0 8px 25px var(--shadow-color);
            object-fit: cover;
            z-index: 1;
            transition: transform 0.4s ease;
        }
        .profile-pic:hover { transform: translateX(-50%) scale(1.08) rotate(3deg); }
        
        .notebook-paper {
            background-color: var(--notebook-bg);
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 100% 36px;
            padding: 90px 30px 40px 50px;
            border-radius: 5px 20px 20px 5px;
            box-shadow: -5px 0 15px var(--shadow-color), 5px 10px 25px var(--shadow-color);
            position: relative;
            border-left: 3px solid var(--heading-color);
            width: 100%;
        }
        .notebook-paper::before {
            content: '';
            position: absolute;
            top: 0; left: 10px; bottom: 0; width: 25px;
            background-image: radial-gradient(circle, var(--bg-color) 7px, transparent 8px);
            background-size: 100% 36px;
            background-position: 0 12px;
        }
        .notebook-paper p {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: var(--notebook-text);
            line-height: 36px;
            text-align: center;
        }

        /* --- 2. Takvim ve Gün Sayacı --- */
        .anniversary-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
        }
        .side-photo {
            width: 180px; height: 240px;
            max-width: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 20px var(--shadow-color);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .side-photo:hover { transform: scale(1.05) translateY(-10px); }
        
        .desk-calendar {
            background: var(--box-bg);
            width: 220px;
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 15px 35px var(--shadow-color);
            overflow: hidden;
            text-align: center;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .calendar-top {
            background: var(--heading-color);
            color: white;
            padding: 18px;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        .calendar-holes {
            display: flex; justify-content: space-around;
            position: absolute; top: 12px; width: 100%;
        }
        .calendar-holes div {
            width: 14px; height: 14px; background: #222; border-radius: 50%;
        }
        .calendar-body { padding: 35px 10px; }
        .days-number {
            font-size: 4.5rem; font-weight: 700; color: var(--text-color);
            line-height: 1; margin-bottom: 5px;
        }
        .days-text {
            font-family: 'Caveat', cursive; font-size: 2rem; color: var(--heading-color);
        }

        /* --- 3. Balon Patlatma Oyunu --- */
        .balloon-section { text-align: center; height: 420px; overflow: hidden; }
        .balloon-container {
            position: absolute; bottom: 80px; width: 100%; height: 250px; left: 0;
        }
        .balloon {
            width: 70px; height: 85px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: absolute; cursor: pointer;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 5px 15px var(--shadow-color);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s ease-in-out infinite;
            z-index: 5;
            -webkit-tap-highlight-color: transparent; /* Mobil tıklama efektini kaldırır */
        }
        .balloon::before {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid inherit;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
            width: 1.5px; height: 60px; background: rgba(0,0,0,0.2);
        }
        .balloon:hover { transform: scale(1.15); }
        .balloon.popped { transform: scale(0); opacity: 0; pointer-events: none; transition: all 0.2s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
        }
        
        .game-message {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            font-family: 'Caveat', cursive; font-size: 2.5rem;
            color: var(--heading-color); opacity: 0;
            transition: opacity 0.5s ease; width: 90%; text-align: center;
        }

        /* --- 4. Panda Boyama --- */
        .panda-section { text-align: center; }
        .panda-wrapper {
            display: flex; justify-content: center; align-items: flex-end; gap: 40px; margin-bottom: 40px;
        }
        .panda { width: 200px; height: 250px; max-width: 45%; transition: transform 0.3s ease; }
        .panda:hover { transform: scale(1.05); }
        
        .btn-paint {
            background-color: var(--primary-btn); color: white; border: none;
            padding: 15px 40px; font-size: 1.4rem; font-family: 'Poppins', sans-serif; font-weight: 600;
            border-radius: 40px; cursor: pointer;
            box-shadow: 0 8px 20px var(--shadow-color);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-paint:hover { transform: translateY(-4px) scale(1.05); }

        /* --- 5. Özel Anlarımız --- */
        .gallery-section h2 {
            font-family: 'Caveat', cursive; font-size: 3.5rem;
            color: var(--heading-color); margin-bottom: 30px; text-align: center;
        }
        .grid-3x2 {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;
        }
        .polaroid {
            background: white; padding: 12px 12px 20px 12px;
            box-shadow: 0 8px 20px var(--shadow-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; position: relative;
            border-radius: 4px; width: 100%;
        }
        .polaroid img { width: 100%; height: 200px; object-fit: cover; border-radius: 3px; }
        .polaroid p {
            font-family: 'Caveat', cursive; font-size: 1.6rem;
            color: #333; margin: 12px 0 0 0; text-align: center;
        }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(odd) { transform: rotate(-2deg); }
        .polaroid:hover { transform: scale(1.10) rotate(0deg); z-index: 10; }

        /* --- 6. Gerçekçi Mektup --- */
        .envelope-container {
            text-align: center;
            margin: 40px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .envelope-section {
            display: flex; justify-content: center; align-items: center; padding: 40px 0; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            width: 100%;
        }
        .envelope {
            position: relative; width: 320px; height: 200px; max-width: 90vw;
            background-color: #b71c1c; border-radius: 8px;
            box-shadow: 0 15px 35px var(--shadow-color);
            transition: transform 0.4s ease;
        }
        .envelope:hover { transform: translateY(-10px) scale(1.02); }
        
        .envelope::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            border-bottom: 100px solid #e53935; border-left: 160px solid transparent; border-right: 160px solid transparent;
            z-index: 2; border-radius: 0 0 8px 8px;
        }
        .envelope-flap {
            position: absolute; top: 0; left: 0; right: 0;
            border-top: 100px solid #c62828; border-left: 160px solid transparent; border-right: 160px solid transparent;
            z-index: 4; transform-origin: top; transition: transform 0.6s ease-in-out;
        }
        .seal-heart {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; background-color: #fff;
            clip-path: polygon(50% 15%, 61% 0, 100% 0, 100% 40%, 50% 100%, 0 40%, 0 0, 39% 0);
            z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            animation: beat 1.5s infinite;
        }
        @keyframes beat { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }

        /* --- 7. Kırmızı Ekran --- */
        #fullscreen-red {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #a30808; color: white; z-index: 1000;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 1s ease;
            overflow-y: auto; padding: 20px;
        }
        .letter-content-wrapper {
            max-width: 800px; width: 100%; font-family: 'Poppins', sans-serif;
            font-size: 1.5rem; line-height: 1.8; text-align: center; text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .typing-cursor::after { content: '|'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* iPhone 13 & Android Mobil Uyumluluk Kapsamlı Ayarları */
        @media (max-width: 768px) {
            .container { padding: 15px; gap: 50px; }
            .grid-3x2 { grid-template-columns: repeat(2, 1fr); }
            .anniversary-section { flex-direction: column; gap: 20px; }
            .notebook-paper { padding: 70px 20px 30px 40px; }
            .notebook-paper p { font-size: 1.8rem; line-height: 30px; }
        }

        @media (max-width: 480px) {
            .container { gap: 40px; }
            .card-box { padding: 25px 15px; }
            
            .notebook-paper { padding: 60px 15px 25px 30px; }
            .notebook-paper p { font-size: 1.6rem; line-height: 28px; }
            .profile-pic { width: 110px; height: 110px; top: -40px; }
            
            .days-number { font-size: 3.5rem; }
            .days-text { font-size: 1.7rem; }
            
            .balloon-section { height: 350px; }
            .balloon { width: 55px; height: 70px; }
            .balloon::after { height: 50px; bottom: -50px; }
            .game-message { font-size: 1.8rem; bottom: 15px; }
            
            .panda-wrapper { flex-direction: column; gap: 20px; align-items: center; }
            .panda { width: 180px; max-width: 80%; }
            .btn-paint { padding: 12px 30px; font-size: 1.2rem; }
            
            .grid-3x2 { grid-template-columns: 1fr; gap: 20px; }
            .polaroid img { height: 220px; }
            
            /* Envelope Zarfın mobilde taşmaması için ölçüleri güvenli alana çektik */
            .envelope { width: 280px; height: 180px; }
            .envelope::after { border-bottom: 90px solid #e53935; border-left: 140px solid transparent; border-right: 140px solid transparent; }
            .envelope-flap { border-top: 90px solid #c62828; border-left: 140px solid transparent; border-right: 140px solid transparent; }
            .seal-heart { top: 75px; width: 35px; height: 35px; }
            
            .section-instruction { font-size: 1.8rem; margin-bottom: 15px; }
            .gallery-section h2 { font-size: 2.8rem; }
            .letter-content-wrapper { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        
        <!-- 1. Defter Yaprağı -->
        <div class="fade-in-section notebook-wrapper">
            <div class="profile-blur-bg"></div>
            <!-- Küçüklük/Birlikte fotoğrafınız buraya -->
            <img src="image/kucukler.jpeg" alt="Küçüklük Fotoğrafımız" class="profile-pic">
            <div class="notebook-paper">
                <p>Yanında çocuklumu bulduğum kadına armağan 💗</p>
            </div>
        </div>

        <!-- 2. Takvim ve Gün Sayacı -->
        <div class="fade-in-section anniversary-section">
            <img src="image/kucuk1.jpeg" alt="Fotoğraf 1" class="side-photo">
            <div class="desk-calendar">
                <div class="calendar-holes">
                    <div></div><div></div><div></div><div></div>
                </div>
                <div class="calendar-top">BİRLİKTEYİZ</div>
                <div class="calendar-body">
                    <div id="days-count" class="days-number">1253</div>
                    <div class="days-text">Gündür...</div>
                </div>
            </div>
            <img src="image/kucuk2.jpeg" alt="Fotoğraf 2" class="side-photo">
        </div>

        <!-- 3. Balon Patlatma Oyunu -->
        <div class="fade-in-section card-box balloon-section">
            <h3 class="section-instruction">Balonları patlat!</h3>
            <div class="balloon-container" id="balloon-container"></div>
            <div id="game-message" class="game-message"></div>
        </div>

        <!-- 4. Panda Boyama Oyunu -->
        <div class="fade-in-section card-box panda-section">
            <h3 class="section-instruction">Ayıları Boya</h3>
            <div class="panda-wrapper">
                <!-- Erkek Panda (Kalpli) -->
                <svg class="panda" id="panda-boy" viewBox="0 0 200 250">
                    <circle cx="50" cy="50" r="20" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="150" cy="50" r="20" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="60" cy="220" r="25" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="140" cy="220" r="25" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <ellipse cx="100" cy="160" rx="65" ry="70" fill="white" stroke="#ccc" stroke-width="4" class="p-body p-stroke" />
                    <path d="M 40 130 Q 20 180 70 180" fill="none" stroke="#ccc" stroke-width="20" stroke-linecap="round" class="p-black p-stroke" />
                    <path d="M 160 130 Q 180 180 130 180" fill="none" stroke="#ccc" stroke-width="20" stroke-linecap="round" class="p-black p-stroke" />
                    <path d="M 100 190 C 100 190 70 160 70 140 C 70 120 100 120 100 140 C 100 120 130 120 130 140 C 130 160 100 190 100 190 Z" fill="white" stroke="#ccc" stroke-width="4" class="p-heart p-stroke" />
                    <circle cx="100" cy="85" r="55" fill="white" stroke="#ccc" stroke-width="4" class="p-body p-stroke"/>
                    <ellipse cx="75" cy="80" rx="15" ry="20" transform="rotate(-30 75 80)" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <ellipse cx="125" cy="80" rx="15" ry="20" transform="rotate(30 125 80)" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="75" cy="80" r="4" fill="#ccc" class="p-eye"/>
                    <circle cx="125" cy="80" r="4" fill="#ccc" class="p-eye"/>
                    <ellipse cx="100" cy="100" rx="8" ry="5" fill="#ccc" class="p-eye"/>
                    <path d="M 90 110 Q 100 120 110 110" fill="none" stroke="#ccc" stroke-width="3" class="p-stroke" />
                </svg>

                <!-- Dişi Panda (Bambulu) -->
                <svg class="panda" id="panda-girl" viewBox="0 0 200 250">
                    <circle cx="50" cy="50" r="20" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="150" cy="50" r="20" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="70" cy="220" r="20" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="130" cy="220" r="20" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <ellipse cx="100" cy="155" rx="55" ry="70" fill="white" stroke="#ccc" stroke-width="4" class="p-body p-stroke" />
                    <rect x="60" y="110" width="15" height="100" transform="rotate(-15 60 110)" fill="white" stroke="#ccc" stroke-width="4" rx="5" class="p-bamboo p-stroke" />
                    <path d="M 50 110 Q 30 100 50 120" fill="white" stroke="#ccc" stroke-width="3" class="p-bamboo-leaf p-stroke" />
                    <path d="M 120 130 Q 150 170 80 160" fill="none" stroke="#ccc" stroke-width="20" stroke-linecap="round" class="p-black p-stroke" />
                    <circle cx="100" cy="85" r="50" fill="white" stroke="#ccc" stroke-width="4" class="p-body p-stroke"/>
                    <ellipse cx="78" cy="80" rx="13" ry="18" transform="rotate(-25 78 80)" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <ellipse cx="122" cy="80" rx="13" ry="18" transform="rotate(25 122 80)" fill="white" stroke="#ccc" stroke-width="4" class="p-black p-stroke" />
                    <circle cx="78" cy="80" r="4" fill="#ccc" class="p-eye"/>
                    <circle cx="122" cy="80" r="4" fill="#ccc" class="p-eye"/>
                    <ellipse cx="100" cy="98" rx="7" ry="4" fill="#ccc" class="p-eye"/>
                    <path d="M 92 108 Q 100 115 108 108" fill="none" stroke="#ccc" stroke-width="3" class="p-stroke" />
                </svg>
            </div>
            <button id="btn-paint" class="btn-paint">Rengini Ver!</button>
        </div>

        <!-- 5. Özel Anlarımız -->
        <div class="fade-in-section gallery-section">
            <h2>Kazanılan Başarımlar!</h2>
            <div class="grid-3x2">
                <div class="polaroid"><img src="image/1.jpeg" alt="An 1"><p>📸Uzun zaman sonra...</p></div>
                <div class="polaroid"><img src="image/2.jpeg" alt="An 2"><p>🥷NEVADAA!!</p></div>
                <div class="polaroid"><img src="image/4.jpeg" alt="An 3"><p>☕Tuzlu kahve</p></div>
                <div class="polaroid"><img src="image/5.jpeg" alt="An 4"><p>🍿Işıklar kapalı</p></div>
                <div class="polaroid"><img src="image/6.jpeg" alt="An 5"><p>☀️Güneş gibi parlak</p></div>
                <div class="polaroid"><img src="image/7.jpeg" alt="An 6"><p>🎨Sanatçının sanatı!</p></div>
            </div>
        </div>

        <!-- 6. Gerçekçi Mektup -->
        <div class="fade-in-section envelope-container">
            <h3 class="section-instruction" style="margin-bottom: 0;">Sana bir mektup var...</h3>
            <div class="envelope-section" id="envelope-section">
                <div class="envelope">
                    <div class="envelope-flap"></div>
                    <div class="seal-heart"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- 7. Tam Ekran Kırmızı Mektup -->
    <div id="fullscreen-red">
        <div class="letter-content-wrapper typing-cursor" id="letter-content"></div>
    </div>

    <script>
        /* --- Scroll Animasyonları (Fade-In) --- */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in-section').forEach(section => {
            observer.observe(section);
        });

        /* --- Gün Sayacı --- */
        const startDate = new Date('2021-06-27'); // Burayı kendi tarihinle değiştir
        const today = new Date();
        const diffInDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('days-count').textContent = diffInDays;

        /* --- Balon Patlatma --- */
        const balloonColors = ['#ff4757', '#1e90ff', '#2ed573', '#ffa502', '#ff6b81'];
        const balloonMessages = [
            "Düşündüğünden daha güzelsin!!", "İyi ki varsınn", "İyi ki hayatımdasınn", 
            "Gülümsemen düşündüğünden daha güzel!", "Sen benim her şeyimsin"
        ];
        const balloonContainer = document.getElementById('balloon-container');
        const gameMessage = document.getElementById('game-message');

        for (let i = 0; i < 5; i++) {
            let balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.backgroundColor = balloonColors[i];
            balloon.style.borderColor = balloonColors[i];
            balloon.style.left = (12 + i * 18) + '%';
            balloon.style.animationDelay = (Math.random() * 2) + 's';
            
            balloon.onclick = function() {
                if(balloon.classList.contains('popped')) return;
                balloon.classList.add('popped');
                
                gameMessage.style.opacity = 0;
                setTimeout(() => {
                    gameMessage.textContent = balloonMessages[i];
                    gameMessage.style.opacity = 1;
                }, 200);
            };
            balloonContainer.appendChild(balloon);
        }

        /* --- Panda Boyama --- */
        let paintStep = 0;
        const btnPaint = document.getElementById('btn-paint');
        
        btnPaint.onclick = function() {
            paintStep++;
            if (paintStep === 1) {
                document.querySelectorAll('.p-black').forEach(el => el.setAttribute('fill', '#2d3436'));
                document.querySelectorAll('.p-eye').forEach(el => el.setAttribute('fill', '#2d3436'));
                document.querySelectorAll('.p-stroke').forEach(el => el.setAttribute('stroke', '#2d3436'));
            } else if (paintStep === 2) {
                document.querySelectorAll('.p-heart').forEach(el => { el.setAttribute('fill', '#d63031'); el.setAttribute('stroke', '#d63031'); });
            } else if (paintStep === 3) {
                document.querySelectorAll('.p-bamboo, .p-bamboo-leaf').forEach(el => { el.setAttribute('fill', '#039151'); el.setAttribute('stroke', '#00b894'); });
            } else if (paintStep === 4) {
                document.querySelectorAll('.p-body').forEach(el => el.setAttribute('fill', '#fdfbfb'));
                btnPaint.style.display = 'none'; // Boyama bittiğinde butonu gizle
            }
        };

        /* --- Mektup Animasyonu --- */
        const envelopeSection = document.getElementById('envelope-section');
        const fullscreenRed = document.getElementById('fullscreen-red');
        const mainContent = document.getElementById('main-content');
        const letterContent = document.getElementById('letter-content');
        
        const letterText = "Küçüğüme 🫠,\n\nÇok yorucu ve seni tüketen bir zamandan geçtiğinin farkındayım.\n\nBuradan zaman zaman moralinin düştüğünü hissediyorum.\n\nGerek sınavların gerekte hayatın senin üstüne gelişi seni yıpratmasın bebeğim.\n\nSen bunlardan daha mislini atlattın bunlar benim aşkımı yıldıramaz!\n\nKonu her ne olursa olsun yanında olup seni koruyacağıma söz veriyorum.\n\nBunları okurken umarım yüzünde o çok güzel gülümsemen vardır.\n\nSeni çoook ama çok seviyorum. Her zaman her konuda yanımda olduğun için teşekkür ederim 💘";

        envelopeSection.onclick = function() {
            document.querySelector('.envelope-flap').style.transform = 'rotateX(180deg)';
            setTimeout(() => {
                fullscreenRed.style.display = 'flex';
                setTimeout(() => {
                    fullscreenRed.style.opacity = 1;
                    mainContent.style.display = 'none';
                    typeWriter();
                }, 100);
            }, 600);
        };

        let i = 0;
        function typeWriter() {
            if (i < letterText.length) {
                let char = letterText.charAt(i);
                if(char === '\n') {
                    letterContent.innerHTML += '<br>';
                } else {
                    letterContent.innerHTML += char;
                }
                i++;
                setTimeout(typeWriter, 45);
            } else {
                letterContent.classList.remove('typing-cursor');
            }
        }
    </script>
</body>
</html>
